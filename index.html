```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 17th Birthday Fajer ❤️</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Decorations -->
    <div id="hearts-container"></div>
    <div id="confetti-container"></div>

    <!-- =========================
         Welcome Screen
    ========================== -->
    <section id="welcome-screen" class="page active">

        <div class="content">

            <h1 class="title">
                Happy 17th Birthday Fajer 🎂
            </h1>

            <p class="subtitle">
                Welcome to your special birthday surprise ❤️
            </p>

            <button id="startBtn">
                Start
            </button>

        </div>

    </section>

    <!-- =========================
         Counter & Photo
    ========================== -->
    <section id="counter-screen" class="page">

        <div class="content">

            <h2>
                We've been together since
            </h2>

            <p class="date">
                01 / 01 / 2024
            </p>

            <div id="counter">
                <div class="counter-box">
                    <span id="days">0</span>
                    <small>Days</small>
                </div>

                <div class="counter-box">
                    <span id="hours">0</span>
                    <small>Hours</small>
                </div>

                <div class="counter-box">
                    <span id="minutes">0</span>
                    <small>Minutes</small>
                </div>

                <div class="counter-box">
                    <span id="seconds">0</span>
                    <small>Seconds</small>
                </div>
            </div>

            <div class="photo-frame">

                <img
                    id="birthdayPhoto"
                    src="images/photo.jpg"
                    alt="Fajer"
                >

            </div>

            <button id="toQuestionBtn">
                Continue ❤️
            </button>

        </div>

    </section>

    <!-- =========================
         Love Question
    ========================== -->
    <section id="question-screen" class="page">

        <div class="content">

            <h2>
                تحبني؟ ❤️
            </h2>

            <div class="question-buttons">

                <button id="yesBtn">
                    إي
                </button>

                <button id="noBtn">
                    لا
                </button>

            </div>

        </div>

    </section>

    <!-- =========================
         Birthday Cake
    ========================== -->
    <section id="cake-screen" class="page">

        <div class="content">

            <h2>
                تمنى أمنية ✨
            </h2>

            <div class="cake-area">

                <div id="cake">

                    <div id="candles"></div>

                </div>

            </div>

            <button id="blowBtn">
                Blow 🎂
            </button>

            <h3 id="loveText">
                أحبك حيل يا كل دنيتي وأحلى شي صار بحياتي ❤️
            </h3>

        </div>

    </section>

    <!-- =========================
         Letter Screen
    ========================== -->
    <section id="letter-screen" class="page">

        <div class="content">

            <h2>
                A Letter For You ❤️
            </h2>

            <div id="messageBox">

                <p id="typewriter">
                    <!-- سيتم إدراج الرسالة الطويلة هنا بواسطة JavaScript -->
                </p>

            </div>

        </div>

    </section>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
```
